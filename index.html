<!DOCTYPE html>
<html lang="ja">

<head>
    <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>nekoryu/clockck</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+2:wght@100..900&family=Noto+Emoji:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <main>
        <div id="controls">
            <div id="full-scr"><span id="full-scr-btn">⛶</span></div>
            <div id="settings"><span id="settings-btn">⚙</span></div>
        </div>
        <div id="datetime-area">
            <div id="clock-wrapper">
                <div id="clock"><span id="hour">--</span><span id="colon">:</span><span id="minute">--</span></div>
                <div id="seconds-area"><span id="seconds">--</span></div>
            </div>
            <div id="date-wrapper">
                <div id="year-area">
                    <span id="year">----</span>
                    <span id="era">----</span>
                    <span id="month-en">---</span>
                    <span id="day-en">---</span>
                </div>
                <div id="date">--/--(--)</div>
            </div>
        </div>
        <div id="weather-area"><span id="weather">----</span><span id="weather-placeName"></span></div>
    </main>
    <div id="settings-modal">
        <div id="settings-container">
            <header id="settings-header">
                <div class="header-buttons">
                    <button id="settings-discard">破棄</button>
                    <button id="settings-save">保存</button>
                </div>
            </header>
            <div id="settings-body">
                <section class="settings-section">
                    <h3>表示設定</h3>
                    <div class="settings-form">
                        <div class="form-group">
                            <label for="set-display-type">液晶タイプ</label>
                            <select id="set-display-type">
                                <option value="lcd">液晶 (位置固定)</option>
                                <option value="oled">有機EL (焼き付き防止)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="set-aspect-ratio">アスペクト比</label>
                            <select id="set-aspect-ratio">
                                <option value="21:9">21:9 (7:3)</option>
                                <option value="20:9">20:9</option>
                                <option value="16:9" selected>16:9</option>
                                <option value="4:3">4:3</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="set-theme">カラーテーマ</label>
                            <select id="set-theme">
                                <option value="auto">システム設定に従う (自動)</option>
                                <option value="default">ダークテーマ (寒色)</option>
                                <option value="light">ライトテーマ</option>
                                <option value="campfire">焚き火</option>
                            </select>
                            <div id="theme-oled-warning" class="warning-box" style="display: none;">
                                ※ライトテーマと有機EL(焼き付き防止)の組み合わせは、背景が広範囲で発光し続けるため焼き付き防止の本来の効果が損なわれます。
                            </div>
                        </div>
                    </div>
                </section>

                <section class="settings-section">
                    <h3>項目設定</h3>
                    <div class="settings-form">
                        <div class="form-group checkbox-group">
                            <label><input type="checkbox" id="item-sec"> 秒を表示</label>
                            <label><input type="checkbox" id="item-weather"> 天候情報全体</label>
                            <div id="weather-sub-items" class="sub-group">
                                <label><input type="checkbox" id="item-feels"> 体感温度</label>
                                <label><input type="checkbox" id="item-humidity"> 湿度</label>
                                <label><input type="checkbox" id="item-wind"> 風速</label>
                                <label><input type="checkbox" id="item-uv"> UV指数</label>
                                <label><input type="checkbox" id="item-precip"> 降水量</label>
                                <label><input type="checkbox" id="item-pressure"> 気圧</label>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="settings-section">
                    <h3>ディマーモード設定</h3>
                    <div class="settings-form">
                        <p style="font-size: 20px; color: var(--modal-label); margin-bottom: 20px;">照度センサーによって画面の輝度を減少させる機能です。</p>
                        <div class="form-group">
                            <label for="set-dimmer-brightness">ディマーモード時の輝度: <span id="dimmer-brightness-val">60</span>%</label>
                            <input type="range" id="set-dimmer-brightness" min="5" max="100" step="5" value="60">
                        </div>
                    </div>
                </section>

                <section class="settings-section">
                    <h3>天気設定</h3>
                    <div class="settings-form">
                        <div class="form-group">
                            <label for="set-api-key">WeatherAPI APIキー</label>
                            <input type="text" id="set-api-key" placeholder="APIキーを入力">
                        </div>
                        <div class="form-group">
                            <label for="set-location">取得場所 (Location)</label>
                            <input type="text" id="set-location" placeholder="例: Sapporo">
                        </div>
                    </div>
                </section>

                <section class="settings-section">
                    <h3>クレジット</h3>
                    <div class="credit-list">
                        <p><strong>リポジトリ:</strong><br>
                            <a href="https://github.com/nekoryu/clockck" target="_blank"
                                rel="noopener">nekoryu/clockck</a>
                        </p>
                        <hr>
                        <p>Powered by <a href="https://www.weatherapi.com/" title="Weather API" target="_blank"
                                rel="noopener">WeatherAPI.com</a></p>
                        <hr>
                        <button id="settings-clear-cache" style="font-size: 20px; padding: 10px 20px; color: #ff5555; background: transparent; border: 1px solid #ff5555; border-radius: 8px; cursor: pointer; margin-top: 10px;">アプリの強制リセット（キャッシュ消去）</button>
                    </div>
                </section>
            </div>
        </div>
    </div>
    <script src="./script.js" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js').then(function (registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function (err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
