<!DOCTYPE html>
<html lang="ja">

<head>
    <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>nekoryu/clockck</title>
    <link
        href="https://fonts.googleapis.com/css2?family=M+PLUS+2:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <main>
        <div id="full-scr"><span id="full-scr-btn">FULL SCREEN</span></div>
        <div id="datetime-area">
            <div id="clock">--:--</div>
            <div id="date-wrapper">
                <div id="year-area">
                    <span id="year">----</span>
                    <span id="era">----</span>
                </div>
                <div id="date">--/--(--)</div>
            </div>
        </div>
        <div id="weather-area"><span id="weather">----</span><span id="weather-placeName"></span></div>
    </main>
    <script src="./script.js" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js').then(function (registration) {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, function (err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
